<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Индекс Еда</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/normolize.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header container">
        <a href="/" class="logo">
            <img width="128" height="58" src="img/logo.png" alt="Лого: Индекс Еда" class="logo-img">
        </a>
        <form action="#" class="search-form">
            <input class="search-input" type="search" placeholder="Блюда" />
            <button class="search-button">
                <img src="img/search-icon.svg" alt="search-icon" class="search-icon" />
            </button>
        </form>
        <div class="auth">
            <a href="#" class="login">Войти</a>
        </div>
        <a href="#" class="shopping-cart">
            <img src="img/fi-rr-shopping-cart.svg" alt="shopping cart">
            <span class="shopping-counter">12</span>
        </a>
    </header>

    <main class="container">
        <div class="slider">
            <div class="slide slide-text-light slide-summer">
                <div class="slide-content">
                    <h2 class="slide-title">Неделя летних овощей</h2>
                    <p class="slide-text">Специальная овощная корзина. Новые продукты, специальные цены, скидки!</p>
                    <a href="#" class="button button-primary">Заказать со скидкой</a>
                </div>
            </div>
        </div>
        <div class="promo">
            <section class="card card-text-light sweet-basket">
                <div class="card-header">
                    <h3 class="card-title">Сладкая корзина</h3>
                    <p class="card-description">Произвольный выбор десертов по Вашему желанию.</p>
                </div>
                <div class="card-footer">
                    <strong class="card_price">ОТ 1300 Р</strong>
                    <span class="card-delivery">Стоимость доставки до 200 Р</span>
                    <a href="#" class="button button-default">Собрать корзину</a>
                </div>
            </section>
        </div>
    </main>

</body>
</html>
